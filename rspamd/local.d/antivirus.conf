# rspamd antivirus (ClamAV) configuration — local.d override.
#
# ClamAV is opt-in. Start the stack with the clamav compose profile to enable it:
#   ./rookery start --profile clamav       (dev)
#   (add 'clamav' to the ExecStart line in the systemd unit for production)
#
# rspamd tries to connect to clamd at clamav:3310. When ClamAV is not running
# rspamd logs a warning and continues without virus scanning — no messages are
# dropped. Enabling the clamav compose profile makes clamd available; rspamd
# discovers it automatically on the next connection attempt.
#
# To disable entirely (suppress the warning logs when ClamAV is intentionally
# not running), uncomment the line below.
# enabled = false;

clamav {
    type    = "clamav";
    socket  = "clamav:3310";
    timeout = 15.0;
    log_clean = true;
    message = "Virus detected: ${SCANNER}: ${VIRUS}";
    action  = "reject";
}

services:
  rookery:
    build:
      context: .
      dockerfile: Containerfile
      args:
        GIT_REVISION: ${GIT_REVISION:-dev}
    image: rookery:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "25:25"
      - "465:465"
      - "587:587"
    env_file: ./config/rookery/.env
    volumes:
      - ./config/rookery/rookery.toml:/etc/rookery/rookery.toml:ro
      - messages-data:/var/lib/rookery/messages
      - caddy-data:/data:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/rookery", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
  postgres:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    env_file: ./config/rookery/.env
    environment:
      POSTGRES_DB:   rookery
      POSTGRES_USER: rookery
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rookery -d rookery"]
      interval: 10s
      timeout: 5s
      retries: 5
  caddy:
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      rookery:
        condition: service_healthy
    profiles: [prod]

  rspamd:
    image: docker.io/rspamd/rspamd:latest
    restart: unless-stopped
    volumes:
      - ./config/rspamd:/etc/rspamd/local.d:ro
      - rspamd-data:/var/lib/rspamd
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rspamc", "stat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  clamav:
    image: docker.io/clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdtop -n 1 2>/dev/null || clamdscan --version"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  mailpit:
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_SMTP_RELAY_HOST: rookery
      MP_SMTP_RELAY_PORT: "25"
      MP_SMTP_RELAY_AUTH: none
    depends_on:
      rookery:
        condition: service_healthy
    profiles: [dev]

  test:
    image: docker.io/library/golang:1.25-bookworm
    working_dir: /src
    volumes:
      - .:/src:ro
      - go-cache:/root/.cache/go
      - go-mod-cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./config/rookery/.env
    command: go test -v -count=1 ./...
    restart: "no"
    profiles: [test]
  lint:
    image: docker.io/library/golang:1.25-bookworm
    working_dir: /src
    volumes:
      - .:/src:ro
      - go-cache:/root/.cache/go
      - go-mod-cache:/go/pkg/mod
    command: go vet ./...
    restart: "no"
    profiles: [lint]

volumes:
  messages-data:
  postgres-data:
  redis-data:
  rspamd-data:
  clamav-data:
  go-cache:
  go-mod-cache:
  caddy-data:
  caddy-config:
